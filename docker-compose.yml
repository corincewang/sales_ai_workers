services:
  db:
    image: postgres:16-alpine
    container_name: sales-ai-workers-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_ai
    ports:
      - "5432:5432"
    volumes:
      - sales_ai_pg:/var/lib/postgresql/data

volumes:
  sales_ai_pg:
